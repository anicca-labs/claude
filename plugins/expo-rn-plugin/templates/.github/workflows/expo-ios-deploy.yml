name: Expo iOS Deploy

on:
  workflow_call:
    inputs:
      environment:
        description: 'Environment (stg, prd)'
        required: true
        type: string
      node-version:
        required: true
        type: string
      yarn-version:
        required: false
        type: string
        default: '4.9.2'
      cocoapods-version:
        required: false
        type: string
        default: '1.16.2'
      macos-runner-image:
        required: false
        type: string
        # Xcode 26.4 (required by Expo SDK 56) lives on the macos-26 image;
        # macos-15 only ships up to Xcode 26.3.
        default: 'macos-26'
      xcode-version:
        required: false
        type: string
        default: '26.4'
        description: 'Expo SDK 56 requires Xcode 26.4 — older Xcode 26.x fails to compile expo-modules-jsi (weak let)'

jobs:
  deploy:
    runs-on: ${{ inputs.macos-runner-image }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Yarn
        run: |
          corepack prepare yarn@${{ inputs.yarn-version }} --activate
          yarn --version

      - name: Install dependencies
        run: yarn install --immutable

      - name: Free-up Space
        run: |
          df -h
          {
            xcrun simctl delete all
            sudo rm -rf ~/Library/Developer/CoreSimulator/Caches/*
            sudo rm -rf ~/Library/Developer/CoreSimulator/Devices/*
          } || {
            echo "Cleaning devices and cache failed. Continuing the execution"
          }
          {
            sudo rm -rf ~/Library/Developer/Xcode/DerivedData
            # Reclaim space from Xcode versions we don't build with. Keep 26.4
            # (the SDK 56 requirement, selected below) and the image default 26.5.
            sudo rm -rf /Applications/Xcode_{26.0.1,26.1.1,26.2,26.3}.app
          } || {
            echo "Cleaning unused xcode version failed. Continuing the execution"
          }
          df -h

      - name: Xcode Select Version
        uses: mobiledevops/xcode-select-version-action@v1
        with:
          xcode-select-version: ${{ inputs.xcode-version }}

      - name: Set up ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Install Fastlane
        run: gem install fastlane

      - name: Install Specific xcodeproj Gem Version
        run: |
          sudo gem uninstall xcodeproj -x --ignore-dependencies || true
          sudo gem install xcodeproj -v 1.25.1

      - name: Setup cocoapods
        run: gem install cocoapods -v ${{ inputs.cocoapods-version }}

      - name: Install Doppler CLI
        run: |
          curl -Ls https://cli.doppler.com/install.sh | sudo sh
          doppler --version

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install iOS platform
        run: sudo xcodebuild -downloadPlatform iOS

      - name: Build and Deploy to Apple App Store
        run: yarn deploy-store-ios
        env:
          ENV: ${{ inputs.environment }}
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          # Apple auth — recommended: an App Store Connect API key stored on EAS.
          # Set it up once with `eas credentials --platform ios` and EAS uses it
          # automatically here (fetched non-interactively via EXPO_TOKEN). No Apple
          # ID, no app-specific password, no 2FA device code. The key is team-wide,
          # so a single upload covers every app/profile and doesn't expire monthly
          # like a cached Apple ID session.
          #
          # Fallback only — if you have NOT uploaded an ASC API key to EAS,
          # uncomment these to authenticate with an Apple ID + app-specific
          # password (a device-code prompt may appear on first run). Generate the
          # password at appleid.apple.com. Prefer the API key above.
          # EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}
          # EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.EXPO_APPLE_APP_SPECIFIC_PASSWORD }}
